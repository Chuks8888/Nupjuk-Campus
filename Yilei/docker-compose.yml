version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: nupjuk_postgres
    restart: always
    environment:
      POSTGRES_USER: nupjuk_admin
      POSTGRES_PASSWORD: nupjuk_password_123
      POSTGRES_DB: nupjuk_campus
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: